      <div class="signup_form_box">

          <input type="text" placeholder="이름" name="name" />
          <input
            id="signup_password"
            type="password"
            placeholder="비밀번호"
            name="password"
          />
          <input
            id="signup_password"
            type="password"
            placeholder="비밀번호"
            name="password"
          />
          <button class="signup_btn">회원가입</button>
        </form>
      </div>
      <!-- 회원가입 바로가기 -->
      <a href="login.html">로그인</a>
    </div>

  <script src="../javascript/index.js"></script>
